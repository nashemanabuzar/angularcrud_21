<mat-card>
    <mat-card-header>
        <div class="header">
            <h1>{{title}}</h1>
            <button (click)="addcustomer()" matButton="filled" type="button">Add Customer</button>
        </div>

    </mat-card-header>
    <mat-card-content>
        <table mat-table [dataSource]="datasource">
            <ng-container matColumnDef="id">
                <th mat-header-cell *matHeaderCellDef>Customer Id</th>
                <td mat-cell *matCellDef="let element">{{element.id}}</td>
            </ng-container>

             <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef>Customer Name</th>
                <td mat-cell *matCellDef="let element">{{element.name}}</td>
            </ng-container>

             <ng-container matColumnDef="email">
                <th mat-header-cell *matHeaderCellDef>Email</th>
                <td mat-cell *matCellDef="let element">{{element.email}}</td>
            </ng-container>

             <ng-container matColumnDef="phone">
                <th mat-header-cell *matHeaderCellDef>Mobile No</th>
                <td mat-cell *matCellDef="let element">{{element.mobile}}</td>
            </ng-container>

             <ng-container matColumnDef="prime">
                <th mat-header-cell *matHeaderCellDef>Prime Customer</th>
                <td mat-cell *matCellDef="let element">{{element.isprime?'Yes':'No'}}</td>
            </ng-container>

             <ng-container matColumnDef="action">
                <th mat-header-cell *matHeaderCellDef>Action</th>
                <td mat-cell *matCellDef="let element">
                    <button (click)="editcustomer(element.id)" matButton="outlined"><mat-icon>edit</mat-icon>Edit</button>
                    <button (click)="deletecustomer(element.id)" style="color: red;" matButton="outlined"><mat-icon>delete</mat-icon>Delete</button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayColums"></tr>
            <tr mat-row *matRowDef="let row;columns:displayColums"></tr>
        </table>
        <mat-paginator [pageSizeOptions]="[5,10,20,50]" showFirstLastButtons="true"></mat-paginator>

    </mat-card-content>
</mat-card>
